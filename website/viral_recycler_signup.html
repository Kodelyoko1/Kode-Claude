<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Start Your Free Trial — ViralRecycler | Wholesale Omniverse</title>
<meta name="description" content="Start your 30-day free trial of ViralRecycler. No credit card required. You'll receive your access key by email within 24 hours.">
<link rel="canonical" href="https://kodelyoko1.github.io/Kode-Claude/viral_recycler_signup.html">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,sans-serif;background:#0a0f1a;color:#e2e8f0;
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#1e293b;border-radius:14px;padding:48px;max-width:520px;width:100%;
        border:1px solid #334155}
  .badge{display:inline-block;background:rgba(16,185,129,.15);color:#10b981;
         padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;
         letter-spacing:1.5px;text-transform:uppercase;margin-bottom:18px}
  h1{font-size:32px;font-weight:900;color:#fff;margin-bottom:8px;letter-spacing:-.5px}
  .sub{color:#94a3b8;margin-bottom:32px;font-size:15px}
  label{display:block;color:#94a3b8;font-size:12px;text-transform:uppercase;
        letter-spacing:1.5px;margin-bottom:8px;font-weight:600}
  input, select{width:100%;background:#0f172a;border:1px solid #334155;color:#fff;
                padding:14px 16px;border-radius:8px;font-size:15px;margin-bottom:18px;
                font-family:inherit}
  input:focus, select:focus{outline:none;border-color:#f59e0b}
  .submit{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;border:none;
          padding:16px;border-radius:8px;width:100%;font-size:16px;font-weight:700;
          cursor:pointer;font-family:inherit;letter-spacing:.3px}
  .submit:hover{filter:brightness(1.1)}
  .trust{color:#64748b;font-size:12px;text-align:center;margin-top:18px;line-height:1.6}
  .trust a{color:#f59e0b}
  .back{display:inline-block;color:#64748b;text-decoration:none;font-size:13px;
        margin-bottom:24px}
  .back:hover{color:#f59e0b}
</style>
</head>
<body>

<div class="card">
  <a href="viral_recycler.html" class="back">&#8592; Back to ViralRecycler</a>
  <div class="badge">30-day free trial &middot; No card required</div>
  <h1>Start your free trial.</h1>
  <p class="sub">Fill out the form below. You&#8217;ll receive your access key and setup instructions by email within 24 hours.</p>

  <form name="viral-recycler-trial" method="POST" action="thank-you.html"
        data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="viral-recycler-trial">
    <p style="display:none;"><label>Skip: <input name="bot-field"></label></p>

    <label>Tier</label>
    <select name="tier" id="tier-select" required>
      <option value="basic">Basic &#8212; 1 Short/day &middot; $29/mo</option>
      <option value="pro" selected>Pro &#8212; 2 Shorts/day + AI captions + color grading &middot; $79/mo</option>
      <option value="studio">Studio &#8212; 3 Shorts/day + stabilization + variants &middot; $149/mo</option>
    </select>

    <label>Your name</label>
    <input name="name" type="text" required placeholder="Jane Smith">

    <label>Email</label>
    <input name="email" type="email" required placeholder="you@example.com">

    <label>Niche</label>
    <select name="niche" required>
      <option value="motivational">Motivational</option>
      <option value="comedy">Comedy Skits</option>
      <option value="wellness">Men&#8217;s Wellness</option>
    </select>

    <button type="submit" class="submit">Start free trial &#8594;</button>

    <p class="trust">
      By starting your trial, you agree to our <a href="privacy.html">privacy policy</a>.<br>
      We <strong style="color:#f59e0b">never</strong> ask for a card during the 30-day trial.
    </p>
  </form>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const tier = params.get('tier');
  if (tier) {
    const sel = document.getElementById('tier-select');
    if (sel) sel.value = tier;
  }
})();
</script>

</body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'data/pseo_pages/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site/we-buy-houses

          # Homepage and existing website pages
          cp website/index.html              _site/index.html
          cp website/dropship_scout_trends.html _site/dropship_scout_trends.html
          cp website/salespage_doctor.html   _site/salespage_doctor.html
          cp website/pricing.html            _site/pricing.html
          cp website/thank-you.html          _site/thank-you.html
          cp website/styles.css              _site/styles.css
          cp website/script.js               _site/script.js
          cp -r website/assets               _site/assets
          cp website/we-buy-houses.html      _site/we-buy-houses.html
          cp website/robots.txt              _site/robots.txt
          cp website/speedaudit.html         _site/speedaudit.html
          cp website/mao-calculator.html     _site/mao-calculator.html
          cp website/404.html                _site/404.html
          cp website/tools.html              _site/tools.html
          cp website/buyers.html             _site/buyers.html
          cp website/sell.html               _site/sell.html
          cp website/privacy.html            _site/privacy.html
          cp website/viral_recycler.html     _site/viral_recycler.html
          cp website/viral_recycler_signup.html _site/viral_recycler_signup.html
          cp website/viral_recycler_dashboard.html _site/viral_recycler_dashboard.html
          cp website/outreach.html           _site/outreach.html
          cp website/deal-analyzer.html      _site/deal-analyzer.html
          cp website/hudscout.html           _site/hudscout.html
          cp website/careerforge.html        _site/careerforge.html
          cp website/trendscout.html         _site/trendscout.html
          cp website/inboxzero.html          _site/inboxzero.html
          cp website/leadsieve.html          _site/leadsieve.html
          cp website/deckforge.html         _site/deckforge.html
          cp website/transcribe.html        _site/transcribe.html
          cp website/proofbot.html          _site/proofbot.html
          cp website/seowriter.html         _site/seowriter.html
          cp website/shownotes.html         _site/shownotes.html
          cp website/batman.html            _site/batman.html
          cp website/pantrychef.html        _site/pantrychef.html
          cp website/thumbforge.html        _site/thumbforge.html
          cp website/carouselforge.html     _site/carouselforge.html
          cp website/bentoforge.html        _site/bentoforge.html
          cp website/buyer-finder.html      _site/buyer-finder.html
          cp website/followup.html          _site/followup.html
          cp website/templateforge.html    _site/templateforge.html
          cp website/podcleaner.html       _site/podcleaner.html
          cp website/gutenbergvoice.html   _site/gutenbergvoice.html
          cp website/courseforge.html      _site/courseforge.html
          cp website/paperbrief.html       _site/paperbrief.html
          cp website/storyforge.html       _site/storyforge.html
          cp website/notiontemplate.html   _site/notiontemplate.html
          cp website/linkmender.html       _site/linkmender.html
          cp website/reputationguard.html  _site/reputationguard.html
          cp website/modbot.html           _site/modbot.html
          cp website/chatconfig.html       _site/chatconfig.html

          # pSEO landing pages — copy flat into root for clean URLs
          cp data/pseo_pages/*.html _site/

          # Auto-generate sitemap.xml
          BASE="https://kodelyoko1.github.io/Kode-Claude"
          echo '<?xml version="1.0" encoding="UTF-8"?>' > _site/sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/</loc><priority>1.0</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/pricing.html</loc><priority>0.9</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/we-buy-houses.html</loc><priority>0.9</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/speedaudit.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/salespage_doctor.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/mao-calculator.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/viral_recycler.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/outreach.html</loc><priority>0.9</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/deal-analyzer.html</loc><priority>0.9</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/hudscout.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/dropship_scout_trends.html</loc><priority>0.7</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/careerforge.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/trendscout.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/inboxzero.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/leadsieve.html</loc><priority>0.9</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/deckforge.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/transcribe.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/proofbot.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/seowriter.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/shownotes.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/batman.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/pantrychef.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/thumbforge.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/carouselforge.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/bentoforge.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/buyer-finder.html</loc><priority>0.9</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/followup.html</loc><priority>0.9</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/templateforge.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/podcleaner.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/gutenbergvoice.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/courseforge.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/paperbrief.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/storyforge.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/notiontemplate.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/linkmender.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/reputationguard.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/modbot.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          echo "  <url><loc>${BASE}/chatconfig.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          for f in _site/we-buy-houses-*.html; do
            slug=$(basename "$f" .html)
            echo "  <url><loc>${BASE}/${slug}.html</loc><priority>0.8</priority></url>" >> _site/sitemap.xml
          done
          echo '</urlset>' >> _site/sitemap.xml

          echo "Site files:"
          ls _site/ | wc -l

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
